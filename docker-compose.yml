services:

  gateway:
    build: ./gateway
    container_name: gateway

    ports:
      - "5000:5000"

    depends_on:
      - node1
      - node2
      - node3

    restart: always

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node1:
    build: ./node1
    container_name: node1

    ports:
      - "5001:5001"

    restart: always

    volumes:
      - ./node1/storage:/app/storage

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node2:
    build: ./node2
    container_name: node2

    ports:
      - "5002:5002"

    restart: always

    volumes:
      - ./node2/storage:/app/storage

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node3:
    build: ./node3
    container_name: node3

    ports:
      - "5003:5003"

    restart: always

    volumes:
      - ./node3/storage:/app/storage

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - gateway

    restart: always