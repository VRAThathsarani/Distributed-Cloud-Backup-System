<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Distributed Cloud Backup System</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->

    <header>

        <h1>☁ Distributed Cloud Backup System</h1>

        <p>
            Secure • Distributed • Fault Tolerant • Cloud Storage
        </p>

    </header>

    <!-- ================= UPLOAD ================= -->

    <section class="card">

        <h2>Upload File</h2>

        <p class="upload-text">
            Select a file to replicate across all storage nodes.
        </p>

        <div class="upload-area">

            <label for="file" class="upload-box">

                <div class="upload-icon">
                    ☁️
                </div>

                <h3>Choose Your File</h3>

                <p>
                    Click here to browse files
                </p>

                <span id="fileName">

                    No file selected

                </span>

            </label>

            <input
                type="file"
                id="file"
                hidden
                onchange="showFileName()"
            >

            <button
                class="upload-btn"
                onclick="uploadFile()">

                ⬆ Upload File

            </button>

        </div>

    </section>

    <!-- ================= STATUS + FILES ================= -->

    <div class="grid">

        <!-- Health -->

        <section class="card">

            <div class="card-title">

                <h2>🖥 System Health</h2>

                <button onclick="loadHealth()">

                    Refresh

                </button>

            </div>

            <div id="health">

            </div>

        </section>

        <!-- Files -->

        <section class="card">

            <div class="card-title">

                <h2>📁 Stored Files</h2>

                <button onclick="loadFiles()">

                    Refresh

                </button>

            </div>

            <div id="files">

            </div>

        </section>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            Distributed Cloud Backup System © 2026

        </p>

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
